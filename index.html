<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Net Informática | Performance Elite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-tech-bg: #0D0D0D; 
            --color-tech-primary: #FF7A00; 
            --font-sans: 'Space Grotesk', sans-serif;
            --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
        }

        @layer base {
            body { 
                @apply bg-tech-bg text-white antialiased; 
                font-family: var(--font-sans);
            }
        }

        @layer utilities {
            .animate-step {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.8s var(--ease-premium), transform 0.8s var(--ease-premium), filter 0.8s var(--ease-premium);
                will-change: opacity, transform, filter;
            }

            .animate-step.active {
                opacity: 1;
                transform: translateY(0);
            }

            .hero-grid {
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                gap: 2rem;
                width: 100%;
                max-width: 1280px;
                margin: 0 auto;
                padding: 0 2rem;
            }
        }

        .hero-sticky-container {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        /* Profundidade: Background move mais devagar (0.5x) */
        #hero-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 110%; /* Extra height para o parallax */
            object-fit: cover;
            will-change: transform, filter;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.6) 0%, transparent 80%);
            z-index: 5;
        }

        /* Texto: Move 1x (normal) ou 1.1x conforme INDEX */
        .text-group-wrapper {
            position: relative;
            z-index: 10;
            will-change: transform, opacity;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 w-full z-50 bg-tech-bg/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <span class="font-black text-xl tracking-tighter uppercase">Center<span class="text-tech-primary">Net</span></span>
            <a href="#contato" class="bg-tech-primary text-tech-bg px-6 py-2 text-[10px] font-black uppercase tracking-widest active:scale-95 transition-transform">WhatsApp Elite</a>
        </div>
    </nav>

    <section id="scroll-hero" class="relative" style="height: 700vh;">
        <div class="hero-sticky-container">
            <canvas id="hero-canvas"></canvas>
            <div class="hero-overlay"></div>
            
            <div class="hero-grid text-group-wrapper" id="text-parallax-layer">
                <div id="step-1" class="col-span-12 lg:col-span-10 text-group">
                    <h2 class="text-4xl md:text-7xl font-black uppercase tracking-tighter leading-[0.95] animate-step">
                        Cansado do seu PC <span class="text-tech-primary">travando</span>, esquentando ou desligando sozinho?
                    </h2>
                </div>

                <div id="step-2" class="col-span-12 lg:col-span-10 absolute inset-0 flex items-center hidden">
                    <h2 class="text-4xl md:text-7xl font-black uppercase tracking-tighter leading-[0.95] animate-step">
                        Pouco espaço no SSD, <span class="text-white/40">lentidão constante</span> e programas que não abrem?
                    </h2>
                </div>

                <div id="step-3" class="col-span-12 lg:col-span-10 absolute inset-0 flex flex-col justify-center hidden">
                    <h2 class="text-4xl md:text-7xl font-black uppercase tracking-tighter leading-[0.95] animate-step">
                        Solução <span class="text-tech-primary">completa</span> Center Net:
                    </h2>
                    <p class="text-lg md:text-xl text-white font-medium mt-6 max-w-2xl animate-step">
                        Máquinas de alta performance e manutenção profissional para velocidade absoluta.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-5 mt-10 animate-step pointer-events-auto">
                        <a href="#contato" class="bg-tech-primary text-tech-bg px-10 py-5 text-sm font-black uppercase tracking-widest active:scale-95 transition-transform">Falar no WhatsApp</a>
                        <a href="#contato" class="border border-white/40 px-10 py-5 text-sm font-black uppercase tracking-widest bg-black/20 backdrop-blur-sm active:scale-95 transition-transform">Orçamento</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="h-screen bg-tech-bg"></div>

    <script>
        lucide.createIcons();

        // 1. Smooth Scroll (Lenis) - Configuração INDEX
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smoothWheel: true,
            lerp: 0.08 // Interpolação solicitada
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Canvas Motion
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        const frameCount = 100;
        const images = [];
        let loadedCount = 0;
        const baseUrl = "./hardline/ezgif-frame-";

        function preload() {
            for (let i = 1; i <= frameCount; i++) {
                const img = new Image();
                img.src = `${baseUrl}${i.toString().padStart(3, '0')}.jpg`;
                img.onload = () => { loadedCount++; if (loadedCount === 1) render(0); };
                images.push(img);
            }
        }

        function render(index) {
            if (!images[index]) return;
            const img = images[index];
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let rw, rh, ox = 0, oy = 0;
            if (canvasRatio > imgRatio) {
                rw = canvas.width; rh = img.height * (canvas.width / img.width);
                oy = (canvas.height - rh) / 2;
            } else {
                rh = canvas.height; rw = img.width * (canvas.height / img.height);
                ox = (canvas.width - rw) / 2;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, ox, oy, rw, rh);
        }

        // Parallax & Motion Sync
        const textLayer = document.getElementById('text-parallax-layer');
        
        lenis.on('scroll', (e) => {
            const scrollArea = document.getElementById('scroll-hero');
            const scrollTop = window.scrollY;
            const scrollHeight = scrollArea.scrollHeight - window.innerHeight;
            
            if (scrollTop <= scrollArea.scrollHeight) {
                const fraction = Math.max(0, Math.min(1, scrollTop / scrollHeight));

                // 2. Background: 0.5x e Texto: 1.1x (Profundidade)
                // Blur progressivo no fundo e Scale sutil conforme INDEX
                canvas.style.transform = `translateY(${scrollTop * 0.5}px) scale(${1 + fraction * 0.05})`;
                canvas.style.filter = `grayscale(100%) brightness(0.6) blur(${fraction * 10}px)`;
                
                // Fade leve no texto ao scroll
                textLayer.style.transform = `translateY(${-scrollTop * 0.1}px)`;
                textLayer.style.opacity = 1 - (fraction * 1.5);

                // Frame Sync
                const frameIndex = Math.floor(fraction * (frameCount - 1));
                render(frameIndex);

                // Steps Logic
                const steps = [
                    { id: 'step-1', range: [0.05, 0.25] },
                    { id: 'step-2', range: [0.35, 0.55] },
                    { id: 'step-3', range: [0.65, 0.95] }
                ];

                steps.forEach(step => {
                    const el = document.getElementById(step.id);
                    const anims = el.querySelectorAll('.animate-step');
                    if (fraction >= step.range[0] && fraction <= step.range[1]) {
                        el.classList.remove('hidden');
                        requestAnimationFrame(() => anims.forEach(a => a.classList.add('active')));
                    } else {
                        anims.forEach(a => a.classList.remove('active'));
                        setTimeout(() => { if (!el.querySelector('.active')) el.classList.add('hidden'); }, 600);
                    }
                });
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render(0);
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        preload();
    </script>
</body>
</html>
