<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Tech | Performance Elite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-tech-bg: #030708; 
            --color-tech-surface: #0D1B2A; 
            --color-tech-primary: #00C2A8; 
            --color-tech-accent: #FF6B00; 
            --color-tech-text: #FFFFFF;
            --font-sans: 'Space Grotesk', sans-serif;
        }

        @layer base {
            body {
                @apply bg-tech-bg text-tech-text antialiased overflow-x-hidden;
                background-image: radial-gradient(circle at 50% 0%, rgba(0, 194, 168, 0.05) 0%, transparent 50%);
            }
        }

        @layer utilities {
            .premium-blur {
                backdrop-filter: blur(20px) saturate(180%);
                background: rgba(13, 27, 42, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .text-glow-green { text-shadow: 0 0 20px rgba(0, 194, 168, 0.4); }
            .hero-heading { letter-spacing: -0.05em; line-height: 0.9; }
            
            /* --- NOVA HARDWARE LINE PREMIUM --- */
            .hardware-line-premium {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 25;
                opacity: 0;
                pointer-events: none;
                transition: opacity 1.2s ease-out;
                will-change: transform, opacity;
            }
            .hardware-line-premium.active { opacity: 1; pointer-events: auto; }
            
            /* Círculo Flutuante (Floating Circle) */
            .hardware-circle {
                width: 15vw;
                height: 15vw;
                border-radius: 50%;
                background: rgba(255, 107, 0, 0.1);
                border: 1px solid rgba(255, 107, 0, 0.4);
                box-shadow: 0 0 40px rgba(255, 107, 0, 0.3), inset 0 0 15px rgba(255, 107, 0, 0.2);
                transform: translateX(25vw) translateY(-10vh); /* Posicionamento à direita e acima */
                animation: premiumFloat 5s ease-in-out infinite;
                will-change: transform;
            }

            @keyframes premiumFloat {
                0%, 100% { transform: translateX(25vw) translateY(-10vh) scale(1); }
                50% { transform: translateX(25vw) translateY(-12vh) scale(1.02); }
            }
        }
        
        body { overflow-y: hidden; }
        .hero-text-block { position: absolute; inset: 0; display: flex; align-items: center; opacity: 0; pointer-events: none; }
        .hero-text-block.active { pointer-events: auto; }
        .fade-up { opacity: 0; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-tech-bg z-[9999] flex flex-col justify-center items-center">
        </div>

    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" id="navbar">
        </nav>

    <section id="scroll-hero" class="relative h-[600vh]">
        <div class="sticky top-0 h-screen w-full overflow-hidden bg-tech-bg">
            <canvas id="hero-canvas" class="absolute inset-0 w-full h-full object-cover opacity-60"></canvas>
            
            <div class="absolute inset-0 bg-gradient-to-b from-tech-bg via-transparent to-tech-bg z-10"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-tech-bg via-transparent to-transparent z-10"></div>

            <div id="hero-container" class="relative z-20 h-full px-6 max-w-7xl mx-auto w-full">
                
                <div id="hardware-line" class="hardware-line-premium">
                    <div class="hardware-circle"></div>
                </div>

                <div id="hero-text-1" class="hero-text-block active">
                    <div class="max-w-4xl text-parallax">
                        <div class="inline-block px-4 py-1 border border-tech-primary/30 rounded-full mb-8 bg-tech-primary/5">
                            <span class="text-[10px] font-black tracking-[0.4em] uppercase text-tech-primary">Tecnologia de Alta Performance</span>
                        </div>
                        <h1 class="text-7xl md:text-9xl hero-heading font-black mb-10Uppercase stagger-text">
                            SEU COMPUTADOR <br/> TE <span class="text-tech-primary italic text-glow-green">ATRASANDO?</span>
                        </h1>
                        <p class="text-xl md:text-2xl text-white/50 max-w-2xl font-light leading-relaxed mb-12">
                            Travando, lento ou dando problema? Isso <span class="text-white">não é normal</span>. Recupere sua produtividade com configuração profissional.
                        </p>
                        <a href="#contato" class="group flex items-center gap-4 bg-tech-primary px-10 py-5 text-tech-bg font-black uppercase text-sm shadow-2xl">
                            Parar de Perder Tempo
                            <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-2 transition-transform"></i>
                        </a>
                    </div>
                </div>

                <div id="hero-text-2" class="hero-text-block">
                    </div>

                <div id="hero-text-3" class="hero-text-block">
                    </div>

            </div>
        </div>
    </section>

    <script>
        // ... (resto do script)

        function initGSAP() {
            gsap.registerPlugin(ScrollTrigger);
            
            // 1. Animação do Canvas
            gsap.to(canvasObj, {
                // ... (lógica existente)
            });

            // 2. TIMELINE DE TEXTO E HARDWARE LINE (AÇÃO CIRÚRGICA)
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1
                }
            });

            // Seletor da Hardware Line
            const hardwareLine = document.getElementById('hardware-line');

            // Texto 1 sai, hardware line aparece
            tl.to("#hero-text-1", { opacity: 0, y: -50, filter: "blur(10px)", duration: 1 })
            .to(hardwareLine, { opacity: 1, duration: 1, onStart: () => hardwareLine.classList.add('active') }, "<") // "<" faz iniciar junto
            // Texto 2 entra
            .to("#hero-text-2", { opacity: 1, y: 0, filter: "blur(0px)", duration: 1 })
            // Texto 2 sai
            .to("#hero-text-2", { opacity: 0, y: -50, filter: "blur(10px)", duration: 1 })
            // Texto 3 entra
            .to("#hero-text-3", { opacity: 1, y: 0, filter: "blur(0px)", duration: 1 })
            // Texto 3 sai, hardware line some
            .to("#hero-text-3", { opacity: 0, y: -50, filter: "blur(10px)", duration: 1 })
            .to(hardwareLine, { opacity: 0, duration: 1 }, "<");
            
            // ... (resto do script)
        }
    </script>
</body>
</html>
