<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Net | Performance Elite</title>
    <meta name="google" content="notranslate">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        /* CSS PURO: Resolve o erro do X Vermelho no Git */
        :root {
            --primary: #FF7A00;
            --bg: #0D0D0D;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        #hero-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .text-group {
            position: absolute;
            width: 90%;
            max-width: 800px;
            opacity: 0;
            transform: translateY(40px);
            filter: blur(15px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out, filter 0.8s ease-out;
            pointer-events: none;
            z-index: 10;
        }

        .text-group.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0px);
            pointer-events: auto;
        }

        .glass-card {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .item-card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            overflow: hidden;
            transition: 0.4s;
        }

        .item-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 122, 0, 0.2), transparent);
            transform: skewX(-25deg);
        }

        .item-card.active::after {
            animation: scan-effect 1.5s ease-in-out forwards;
        }

        @keyframes scan-effect {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        .highlight { color: var(--primary); }
    </style>
</head>
<body>

    <div id="preloader" style="position: fixed; inset: 0; z-index: 100; background: #0D0D0D; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.6s;">
        <div style="width: 200px; height: 2px; background: rgba(255,255,255,0.1); overflow: hidden;">
            <div id="load-fill" style="width: 0%; height: 100%; background: var(--primary); transition: 0.3s;"></div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-black/40 backdrop-blur-md border-b border-white/5">
        <div class="font-black text-xl uppercase tracking-tighter">Center<span class="highlight">Net</span></div>
        <a href="https://wa.me/seunumeroaqui" class="bg-primary text-black px-6 py-2 font-bold text-[10px] uppercase tracking-widest">WhatsApp Elite</a>
    </nav>

    <section id="hero-trigger" style="height: 600vh; position: relative;">
        <div style="position: sticky; top: 0; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center;">
            <canvas id="hero-canvas"></canvas>
            
            <div class="relative z-10 w-full max-w-7xl px-6">
                <div id="step-1" class="text-group">
                    <div class="glass-card">
                        <h2 class="text-4xl md:text-6xl font-black uppercase leading-tight">O fluxo <span class="highlight">não pode parar</span>.</h2>
                    </div>
                </div>
                <div id="step-2" class="text-group">
                    <div class="glass-card">
                        <h2 class="text-4xl md:text-6xl font-black uppercase leading-tight">Hardware de <span class="highlight">Elite</span>.</h2>
                    </div>
                </div>
                <div id="step-3" class="text-group">
                    <div class="glass-card">
                        <h2 class="text-4xl md:text-6xl font-black uppercase leading-tight">Performance <span class="highlight">Absoluta</span>.</h2>
                        <p class="mt-4 text-white/50 uppercase tracking-widest text-[10px] font-bold">Center Net Informática</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="produtos" class="relative z-20 py-32 bg-[#0D0D0D] border-t border-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-black uppercase mb-16 italic">Produtos</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="item-card group">
                    <img src="produtos/amdryzen5.png" class="h-40 mx-auto mb-6 object-contain group-hover:scale-110 transition-transform">
                    <h3 class="text-xl font-bold uppercase text-center">AMD Ryzen 5</h3>
                </div>
                <div class="item-card group">
                    <img src="produtos/nitrov5.png" class="h-40 mx-auto mb-6 object-contain group-hover:scale-110 transition-transform">
                    <h3 class="text-xl font-bold uppercase text-center">Acer Nitro V</h3>
                </div>
                <div class="item-card group">
                    <img src="produtos/rtx3090.png" class="h-40 mx-auto mb-6 object-contain group-hover:scale-110 transition-transform">
                    <h3 class="text-xl font-bold uppercase text-center">RTX 3060 Elite</h3>
                </div>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        const frameCount = 100;
        const images = [];
        let loaded = 0;
        const baseUrl = "./hardline/ezgif-frame-";

        let currentFrame = 0, targetFrame = 0, lastTime = 0;

        function preload() {
            for (let i = 1; i <= frameCount; i++) {
                const img = new Image();
                img.src = `${baseUrl}${i.toString().padStart(3, '0')}.jpg`;
                img.onload = () => {
                    loaded++;
                    document.getElementById('load-fill').style.width = (loaded/frameCount)*100 + "%";
                    if(loaded === frameCount) {
                        document.getElementById('preloader').style.opacity = '0';
                        setTimeout(() => document.getElementById('preloader').style.display = 'none', 600);
                        requestAnimationFrame(renderLoop);
                    }
                };
                images.push(img);
            }
        }

        function renderLoop(time) {
            const dt = time - lastTime;
            lastTime = time;
            currentFrame += (targetFrame - currentFrame) * Math.min(1, 0.012 * dt);
            
            const img = images[Math.round(currentFrame)];
            if(img) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                const w = img.width * ratio, h = img.height * ratio;
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.drawImage(img, (canvas.width-w)/2, (canvas.height-h)/2, w, h);
            }
            requestAnimationFrame(renderLoop);
        }

        window.addEventListener('scroll', () => {
            const section = document.getElementById('hero-trigger');
            const progress = window.pageYOffset / (section.scrollHeight - window.innerHeight);
            targetFrame = progress * (frameCount - 1);

            const s1 = document.getElementById('step-1'), s2 = document.getElementById('step-2'), s3 = document.getElementById('step-3');
            s1.classList.toggle('active', progress > 0.05 && progress < 0.3);
            s2.classList.toggle('active', progress > 0.35 && progress < 0.6);
            s3.classList.toggle('active', progress > 0.65);

            if(progress > 0.9) document.querySelectorAll('.item-card').forEach(c => c.classList.add('active'));
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        preload();
    </script>
</body>
</html>
