<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Net Informática | Performance Elite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-tech-bg: #0D0D0D; 
            --color-tech-primary: #FF7A00; 
            --font-sans: 'Space Grotesk', sans-serif;
            /* 1. Ajustar Easing (Premium Ease-out) */
            --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
        }

        @layer base {
            body { 
                @apply bg-tech-bg text-white antialiased overflow-x-hidden; 
                font-family: var(--font-sans);
            }
        }

        @layer utilities {
            /* 2. Delay em Cascata e 5. Distância Reduzida (20px) */
            .animate-step {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.6s var(--ease-premium), transform 0.6s var(--ease-premium);
                will-change: opacity, transform;
            }

            .animate-step.active {
                opacity: 1;
                transform: translateY(0);
            }

            .delay-title { transition-delay: 0.1s; }
            .delay-subtitle { transition-delay: 0.2s; }
            .delay-button { transition-delay: 0.3s; }

            /* 3. Micro interação no botão */
            .btn-interaction:active {
                transform: scale(0.96);
                transition: transform 0.1s var(--ease-premium);
            }

            .hero-grid {
                display: grid;
                grid-template-columns: repeat(12, 1fr);
                gap: 2rem;
                width: 100%;
                max-width: 1280px;
                margin: 0 auto;
                padding: 0 2rem;
            }
        }

        /* 4. Efeito de fluidez no scroll (SÓ no hero) */
        .hero-main-container {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
            background-color: #0D0D0D;
            /* Garante fluidez visual inicial */
            will-change: transform, opacity;
        }

        #hero-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 70%);
            z-index: 5;
        }

        .text-group {
            grid-column: 1 / span 10;
            text-align: left;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 w-full z-50 bg-tech-bg/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <span class="font-black text-xl tracking-tighter uppercase">Center<span class="text-tech-primary">Net</span></span>
            <a href="#contato" class="bg-tech-primary text-tech-bg px-6 py-2 text-[10px] font-black uppercase tracking-widest btn-interaction transition-transform">WhatsApp Elite</a>
        </div>
    </nav>

    <section id="scroll-hero" class="relative" style="height: 600vh;">
        
        <div class="hero-main-container" id="hero-fluid-target">
            <canvas id="hero-canvas"></canvas>
            <div class="hero-overlay"></div>
            
            <div class="hero-grid relative z-10">
                
                <div id="step-1" class="text-group">
                    <h2 class="text-4xl md:text-7xl font-black uppercase tracking-tighter leading-[0.95] animate-step delay-title">
                        Cansado do seu PC <span class="text-tech-primary">travando</span>, esquentando ou desligando sozinho?
                    </h2>
                </div>

                <div id="step-2" class="text-group absolute inset-0 flex items-center px-8 lg:px-20 hidden">
                    <h2 class="text-4xl md:text-7xl font-black uppercase tracking-tighter leading-[0.95] animate-step delay-title">
                        Pouco espaço, <span class="text-white/40">lentidão constante</span> e programas que não abrem?
                    </h2>
                </div>

                <div id="step-3" class="text-group absolute inset-0 flex flex-col justify-center px-8 lg:px-20 hidden">
                    <h2 class="text-4xl md:text-7xl font-black uppercase tracking-tighter leading-[0.95] animate-step delay-title">
                        Solução <span class="text-tech-primary">completa</span> Center Net:
                    </h2>
                    <p class="text-lg md:text-xl text-white font-medium mt-6 max-w-2xl animate-step delay-subtitle">
                        Máquinas de alta performance e manutenção profissional para velocidade absoluta.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-5 mt-10 animate-step delay-button pointer-events-auto">
                        <a href="#contato" class="bg-tech-primary text-tech-bg px-10 py-5 text-sm font-black uppercase tracking-widest btn-interaction">WhatsApp</a>
                        <a href="#contato" class="border border-white/40 px-10 py-5 text-sm font-black uppercase tracking-widest bg-black/20 backdrop-blur-sm btn-interaction">Orçamento</a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();

        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        const heroFluidTarget = document.getElementById('hero-fluid-target');
        const frameCount = 100;
        const images = [];
        let loadedCount = 0;
        const baseUrl = "./hardline/ezgif-frame-";

        function preloadImages() {
            for (let i = 1; i <= frameCount; i++) {
                const img = new Image();
                img.src = `${baseUrl}${i.toString().padStart(3, '0')}.jpg`;
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === 1) renderFrame(0);
                };
                images.push(img);
            }
        }

        function renderFrame(index) {
            if (!images[index]) return;
            const img = images[index];
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let rw, rh, ox = 0, oy = 0;
            if (canvasRatio > imgRatio) {
                rw = canvas.width; rh = img.height * (canvas.width / img.width);
                oy = (canvas.height - rh) / 2;
            } else {
                rh = canvas.height; rw = img.width * (canvas.height / img.height);
                ox = (canvas.width - rw) / 2;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, ox, oy, rw, rh);
        }

        window.addEventListener('scroll', () => {
            const scrollArea = document.getElementById('scroll-hero');
            const scrollTop = window.scrollY;
            const scrollHeight = scrollArea.scrollHeight - window.innerHeight;
            
            // Só executa se estiver dentro do Hero
            if (scrollTop <= scrollArea.scrollHeight) {
                const scrollFraction = Math.max(0, Math.min(1, scrollTop / scrollHeight));

                // 4. Efeito de fluidez no scroll (Acompanhar dedo e sumir suave)
                // Movimento curto (0.2) e Fade out proporcional
                heroFluidTarget.style.transform = `translateY(${scrollTop * 0.2}px)`;
                heroFluidTarget.style.opacity = 1 - (scrollTop / 1000);

                // Frame Sync
                const frameIndex = Math.floor(scrollFraction * (frameCount - 1));
                requestAnimationFrame(() => renderFrame(frameIndex));

                // Lógica de Ativação dos Steps
                const steps = [
                    { id: 'step-1', range: [0.05, 0.3] },
                    { id: 'step-2', range: [0.35, 0.6] },
                    { id: 'step-3', range: [0.65, 0.95] }
                ];

                steps.forEach(step => {
                    const el = document.getElementById(step.id);
                    const anims = el.querySelectorAll('.animate-step');
                    
                    if (scrollFraction >= step.range[0] && scrollFraction <= step.range[1]) {
                        el.classList.remove('hidden');
                        requestAnimationFrame(() => {
                            anims.forEach(a => a.classList.add('active'));
                        });
                    } else {
                        anims.forEach(a => a.classList.remove('active'));
                        // Pequeno delay para esconder o elemento após a animação de saída
                        setTimeout(() => { if (!anims[0].classList.contains('active')) el.classList.add('hidden'); }, 600);
                    }
                });
            }
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderFrame(0);
        }

        window.addEventListener('resize', resize);
        resize();
        preloadImages();
    </script>
</body>
</html>
